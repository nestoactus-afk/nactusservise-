<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NACTUS — Mes favoris</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0b0f1a;--ink-soft:#374151;--muted:#6b7280;--bg:#f9f8f6;--white:#ffffff;--card:#ffffff;--border:#e2e8f0;--accent:#e85d26;--accent2:#f5a623;--accent-grd:linear-gradient(135deg,#e85d26,#f5a623);--radius:14px;--shadow:0 4px 24px rgba(11,15,26,.08);--t:all .28s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{--ink:#f1f5f9;--ink-soft:#cbd5e1;--muted:#94a3b8;--bg:#0d1117;--white:#161b27;--card:#1e2435;--border:#2d3a52;--shadow:0 4px 24px rgba(0,0,0,.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;transition:background .3s,color .3s}
header{background:rgba(255,255,255,.85);position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(0,0,0,.06);backdrop-filter:blur(16px);transition:background .3s}
[data-theme="dark"] header{background:rgba(22,27,39,.85)}
.nav{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;padding:0 32px;height:72px;gap:16px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0}
.logo-mark{width:40px;height:40px;background:var(--accent-grd);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;color:white;font-size:18px}
.logo-text{font-family:'Playfair Display',serif;font-weight:900;font-size:22px;color:var(--ink)}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{padding:8px 16px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:15px;font-weight:600;transition:var(--t)}
.nav-links a:hover{background:rgba(232,93,38,.08);color:var(--accent)}

.page-hero{padding:52px 32px 32px;text-align:center}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;margin-bottom:10px}
.page-hero p{color:var(--muted);font-size:15px}

.container{max-width:1000px;margin:0 auto;padding:20px 32px 80px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.result-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:var(--t);display:flex;flex-direction:column;position:relative}
.result-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.result-card a{text-decoration:none;color:inherit;display:flex;flex-direction:column;flex:1}
.result-img{aspect-ratio:16/9;overflow:hidden;background:var(--bg)}
.result-img img{width:100%;height:100%;object-fit:cover}
.no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:linear-gradient(135deg,#e2e8f0,#cbd5e1)}
.result-body{padding:18px;flex:1}
.result-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.badge-sport{background:#fef3c7;color:#d97706}.badge-edu{background:#d1fae5;color:#059669}.badge-pol{background:#ede9fe;color:#6d28d9}.badge-actu{background:#e0e7ff;color:#4f46e5}
.result-body h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;line-height:1.3}
.remove-btn{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:var(--t);z-index:2}
.remove-btn:hover{background:#fee2e2;transform:scale(1.08)}

.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .icon{font-size:3rem;margin-bottom:16px}
.empty-state h3{font-size:1.2rem;color:var(--ink);margin-bottom:8px}
.empty-state a{color:var(--accent);font-weight:700;text-decoration:none}

.skeleton{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius);height:220px}
[data-theme="dark"] .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:700px){.nav-links{display:none}.page-hero{padding:36px 16px 24px}.container{padding:16px 16px 60px}}
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a class="logo" href="index.html">
      <div class="logo-mark">N</div>
      <span class="logo-text">NACTUS</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="sport.html">Sport</a></li>
      <li><a href="education.html">Éducation</a></li>
      <li><a href="politique.html">Politique</a></li>
    </ul>
  </nav>
</header>

<div class="page-hero">
  <h1>🔖 Mes favoris</h1>
  <p>Retrouvez ici tous les articles que vous avez sauvegardés</p>
</div>

<div class="container">
  <div class="results-grid" id="results-grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const CFG = {apiKey:"AIzaSyCmUN4AsQ7oryWpF6ULtshkZEOuvFekAOo",authDomain:"videome-b7157.firebaseapp.com",projectId:"videome-b7157",storageBucket:"videome-b7157.appspot.com",messagingSenderId:"365500246890",appId:"1:365500246890:web:99423413909b9fcc631313"};
const app = getApps().length ? getApps()[0] : initializeApp(CFG);
const auth = getAuth(app);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

function esc(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function badgeCls(c){return {Sport:'badge-sport',Éducation:'badge-edu',Politique:'badge-pol'}[c]||'badge-actu';}
function catEmoji(c){return {Sport:'⚽',Éducation:'📚',Politique:'🏛️'}[c]||'📰';}

let unsub = null;

onAuthStateChanged(auth, user => {
  if (unsub) { unsub(); unsub = null; }

  if (!user) {
    $('results-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🔐</div>
      <h3>Connexion requise</h3>
      <p>Connectez-vous pour voir vos articles favoris.<br><a href="login.html">Se connecter</a></p>
    </div>`;
    return;
  }

  unsub = onSnapshot(
    query(collection(db, 'favorites'), where('uid', '==', user.uid)),
    snap => {
      // Tri côté client : plus récent en premier (évite l'index composite Firestore)
      const docs = snap.docs.slice().sort((a, b) => {
        const ta = a.data().savedAt?.toMillis?.() || 0;
        const tb = b.data().savedAt?.toMillis?.() || 0;
        return tb - ta;
      });
      const grid = $('results-grid');
      if (docs.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🔖</div>
          <h3>Aucun favori pour l'instant</h3>
          <p>Cliquez sur "🔖 Sauvegarder" sur un article pour le retrouver ici.<br><a href="index.html">Découvrir des articles</a></p>
        </div>`;
        return;
      }
      grid.innerHTML = docs.map(d => {
        const f = d.data();
        const img = f.imageUrl
          ? `<img src="${encodeURI(f.imageUrl)}" alt="${esc(f.title)}" loading="lazy">`
          : `<div class="no-img">${catEmoji(f.category)}</div>`;
        return `<div class="result-card" data-fav-id="${d.id}">
          <button class="remove-btn" title="Retirer des favoris" data-remove="${d.id}">✕</button>
          <a href="article.html?id=${f.articleId}">
            <div class="result-img">${img}</div>
            <div class="result-body">
              <span class="result-badge ${badgeCls(f.category)}">${esc(f.category || 'Actualité')}</span>
              <h3>${esc(f.title)}</h3>
            </div>
          </a>
        </div>`;
      }).join('');

      grid.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            await deleteDoc(doc(db, 'favorites', btn.dataset.remove));
            window.NACTUS?.toast('🗑️ Retiré des favoris');
          } catch(err) {
            window.NACTUS?.toast('❌ ' + err.message);
          }
        });
      });
    },
    err => {
      console.error(err);
      $('results-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Erreur de chargement</h3><p>${esc(err.message)}</p></div>`;
    }
  );
});
</script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.0"></script>

<script type="module" src="appwrite-storage.js"></script>
<script type="module" src="nactus-ui.js"></script>
</body>
</html>
